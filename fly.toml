# Fly.io — deploy when your org has machine quota:
#   fly apps list
#   fly secrets set AUTH_SECRET="$(openssl rand -base64 32)" DATABASE_URL="postgresql://..."
#   fly deploy
#
# Provision Postgres separately (or attach Neon) and set DATABASE_URL.

app = "sentinelforge-replace-me"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
