# Only send the "upgrade" Connection header when the client requests an upgrade
# (needed for Socket.IO / WebSockets without breaking keepalive on normal requests).
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream sentinelforge_app {
  server app:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 20m;

  # Health endpoint (used by load balancers / uptime checks).
  location = /api/health {
    proxy_pass http://sentinelforge_app;
    proxy_set_header Host $host;
    access_log off;
  }

  # Socket.IO upgrade path.
  location /socket.io/ {
    proxy_pass http://sentinelforge_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location / {
    proxy_pass http://sentinelforge_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

